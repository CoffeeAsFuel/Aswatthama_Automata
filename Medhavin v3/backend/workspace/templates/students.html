<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Management System</title>
</head>
<body>
    <h1>Student Result Management System</h1>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Total</th>
            <th>Percentage</th>
            <th>Grade</th>
            <th>Pass/Fail</th>
        </tr>
        {% for result in results %}
        <tr>
            <td>{{ result.name }}</td>
            <td>{{ result.total }}</td>
            <td>{{ result.percentage }}%</td>
            <td>{{ result.grade }}</td>
            <td>{{ result.pass_fail }}</td>
        </tr>
        {% endfor %}
    </table>
    <p><a href="{{ url_for('add_student') }}">Add Student</a></p>
    <p><a href="{{ url_for('search') }}">Search Student</a></p>
</body>
</html>
